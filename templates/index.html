<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0c0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PayCalendar">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>PayCalendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --bg:#0c0f14;--bg2:#0f1520;--bg3:#111820;
  --border:#131e2d;--border2:#1e2d45;--border3:#2a3a50;
  --text:#c8d8ec;--text2:#8aa8c8;--text3:#5a7a9a;--text4:#2a3a4a;
  --white:#f0f6ff;--topbar:rgba(12,15,20,.97);--sum-bg:#0a0d12;--sp-head:#0e1420;
  --inv-bg:#0f1520;--modal-bg:#0f1720;--log-bg:#080c12;--dow-bg:#0c0f14;--form-bg:#0c1420;
  --gold:#f59e0b;--gold2:#d97706;--red:#f87171;--green:#4ade80;--amber:#fbbf24;
  --blue:#38bdf8;--purple:#c084fc;--teal:#2dd4bf;--orange:#fb923c;
}
[data-theme="grey"]{
  --bg:#1e2128;--bg2:#252930;--bg3:#2a2e37;
  --border:#30343e;--border2:#3a404c;--border3:#464e5c;
  --text:#d4dce8;--text2:#9aa8be;--text3:#6a7a96;--text4:#3a4560;
  --white:#eef2f8;--topbar:rgba(28,31,38,.97);--sum-bg:#191c22;--sp-head:#1e222c;
  --inv-bg:#252930;--modal-bg:#1e2230;--log-bg:#141720;--dow-bg:#1e2128;--form-bg:#181c24;
  --gold:#f59e0b;--gold2:#d97706;--red:#f87171;--green:#4ade80;--amber:#fbbf24;
  --blue:#38bdf8;--purple:#c084fc;--teal:#2dd4bf;--orange:#fb923c;
}
[data-theme="white"]{
  --bg:#f5f7fa;--bg2:#fff;--bg3:#eef1f6;
  --border:#dde2ea;--border2:#c8d0dc;--border3:#b0bccb;
  --text:#1a2540;--text2:#3a5070;--text3:#6a85a0;--text4:#a0b4c8;
  --white:#0a1828;--topbar:rgba(245,247,250,.97);--sum-bg:#eef1f6;--sp-head:#f8f9fc;
  --inv-bg:#fff;--modal-bg:#fff;--log-bg:#f0f3f8;--dow-bg:#f5f7fa;--form-bg:#f0f4f9;
  --gold:#d97706;--gold2:#b45309;--red:#dc2626;--green:#16a34a;--amber:#d97706;
  --blue:#0284c7;--purple:#7c3aed;--teal:#0d9488;--orange:#ea580c;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select{font-family:'DM Sans',sans-serif}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--topbar);backdrop-filter:blur(20px);flex-shrink:0;gap:10px;flex-wrap:wrap;z-index:50}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#000}
.brand-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--white);letter-spacing:-.3px}
.brand-sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:1.5px;margin-top:1px}
#company-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);padding:4px 10px;border:1px solid var(--border2);border-radius:5px}
.topbar-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:8px}
#month-label{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--white);min-width:180px;text-align:center;letter-spacing:-.3px}
.nav-btn{width:27px;height:27px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{border-color:var(--border3);color:var(--text);background:var(--bg2)}
.stat-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;border:1px solid var(--border2);background:var(--bg3);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap}
.stat-pill .pv{font-weight:500}
.pill-red{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}.pill-red .pv{color:var(--red)}
.pill-amber{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}.pill-amber .pv{color:var(--amber)}
.pill-blue{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.05)}.pill-blue .pv{color:var(--blue)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:none;font-size:12px;font-weight:600;transition:all .18s;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-glass{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border2)}
.btn-glass:hover{border-color:var(--border3);color:var(--text)}
.btn-sm{padding:3px 9px;font-size:11px;border-radius:5px}
.btn-paid{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.btn-paid:hover{background:rgba(74,222,128,.2)}
.btn-edit{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.btn-edit:hover{background:rgba(56,189,248,.2)}
.btn-del{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-del:hover{background:rgba(248,113,113,.2)}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden}
.vtab{padding:5px 12px;font-size:12px;font-weight:600;background:transparent;border:none;color:var(--text3);transition:all .15s}
.vtab.active{background:var(--bg2);color:var(--text)}
.vtab:hover:not(.active){color:var(--text2)}

/* THEME */
.theme-sw{display:flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden;gap:1px;background:var(--border)}
.th-btn{width:26px;height:26px;border:none;cursor:pointer;position:relative;transition:transform .15s;display:flex;align-items:center;justify-content:center;font-size:12px}
.th-btn:hover{transform:scale(1.1)}
.th-btn.active::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:12px;height:2px;border-radius:2px;background:var(--gold)}
.th-dark{background:#0c0f14}.th-grey{background:#2a2e37}.th-white{background:#f5f7fa}

/* SUMMARY BAR */
#sum-bar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--sum-bg);flex-shrink:0;overflow-x:auto}
.sep-lbl{padding:0 12px;display:flex;align-items:center;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text4);white-space:nowrap;flex-shrink:0}
.sb{flex:1;min-width:130px;padding:10px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden}
.sb::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px}
.sb-m1::after{background:linear-gradient(90deg,var(--blue),transparent)}
.sb-m2::after{background:linear-gradient(90deg,var(--red),transparent)}
.sb-m3::after{background:linear-gradient(90deg,var(--green),transparent)}
.sb-m4::after{display:none}
.sb-w1::after{background:linear-gradient(90deg,var(--purple),transparent)}
.sb-w2::after{background:linear-gradient(90deg,var(--orange),transparent)}
.sb-w3::after{background:linear-gradient(90deg,var(--teal),transparent)}
.sb:last-child{border-right:none}
.sb-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text4);margin-bottom:1px}
.sb-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;letter-spacing:-.5px;line-height:1.1}
.sb-sub{font-size:10px;color:var(--text4);margin-top:1px}
.sb-prog{height:3px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.sb-prog-fill{height:100%;border-radius:3px;transition:width .5s}
.sb-div{width:1px;background:linear-gradient(180deg,transparent,var(--border2),transparent);margin:6px 0;flex-shrink:0}

/* MAIN */
#body-wrap{flex:1;display:flex;overflow:hidden}
#cal-main{flex:1;overflow:auto}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.dow-h{padding:9px 0;text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--dow-bg);position:sticky;top:0;z-index:10}
.day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:7px;cursor:pointer;transition:background .1s;position:relative}
.day:hover{background:rgba(255,255,255,.015)}
.day.today{background:rgba(245,158,11,.03)}.day.today::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.day.dim{opacity:.28}.day.act{background:rgba(56,189,248,.05)}
.day.has-ov{border-top:2px solid rgba(248,113,113,.5)}.day.has-ug{border-top:2px solid rgba(251,191,36,.45)}
.day-n{display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:5px}
.dn{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-size:11px}
.today .dn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700}
.d-sum{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4)}.d-sum.has{color:#4a8a5a}
.chip{display:flex;align-items:center;gap:4px;padding:2px 5px;border-radius:4px;margin-bottom:2px;font-size:10px;overflow:hidden;border-left:2px solid;transition:filter .1s;overflow:hidden;min-width:0}
.chip:hover{filter:brightness(1.2)}
.chip-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.chip-a{font-family:'DM Mono',monospace;font-size:9px;white-space:nowrap;opacity:.8}
.chip-d{width:4px;height:4px;border-radius:50%;flex-shrink:0;background:currentColor}
.more{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4)}

/* SIDE PANEL */
#sp{width:285px;min-width:285px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;animation:slideIn .18s ease}
@keyframes slideIn{from{transform:translateX(14px);opacity:0}to{transform:none;opacity:1}}
.sp-h{padding:16px 14px 12px;border-bottom:1px solid var(--border);background:var(--sp-head);flex-shrink:0}
.sp-date{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--white);letter-spacing:-.4px}
.sp-dow{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sp-tot{margin-top:10px;padding:9px 11px;border-radius:7px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.15)}
.sp-tot-l{font-family:'DM Mono',monospace;font-size:8px;color:#a07020;letter-spacing:1px;text-transform:uppercase}
.sp-tot-v{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--gold);margin-top:1px}
.sp-b{flex:1;overflow-y:auto;padding:12px}
.sp-sec{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);margin-bottom:7px}
.icard{background:var(--inv-bg);border:1px solid var(--border2);border-radius:8px;padding:10px;margin-bottom:7px;border-left:3px solid;transition:border-color .12s}
.icard:hover{border-color:var(--border3)}
.ic-vat{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 2px}
.vat-net{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 7px;border-radius:4px}
.vat-tax{font-size:11px;color:#f59e0b;background:#451a0322;padding:2px 7px;border-radius:4px;border:1px solid #d9770622}
.btn-pri{font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap}
.btn-pri-high  {background:#450a0a22;color:#f87171;border:1px solid #dc262644}
.btn-pri-medium{background:#451a0322;color:#fbbf24;border:1px solid #d9770644}
.btn-pri-low   {background:#064e3b22;color:#6ee7b7;border:1px solid #05966944}
.btn-pri-none  {background:transparent;color:var(--text3);border:1px solid var(--border2)}
.chip-pri{font-size:9px;margin-left:1px;vertical-align:middle}
.ic-overdue{
  font-size:11px;font-weight:700;color:#fff;
  background:#dc2626;border-radius:5px;
  padding:2px 8px;margin-left:4px;white-space:nowrap;
  animation:pulse-red 2s ease infinite;
}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.7}}
.ic-v{font-size:13px;font-weight:600;color:var(--white)}.ic-d{font-size:10px;color:var(--text4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-m{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.ic-a{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.ic-b{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px}
.ic-n{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);margin-top:3px}
.ic-act{display:flex;gap:5px;margin-top:7px}
.sp-empty{text-align:center;padding:36px 0;color:var(--text4)}

/* LEGEND */
#legend{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--sum-bg);flex-shrink:0}
.leg-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text4)}
.leg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.leg-d{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.leg-sep{width:1px;height:11px;background:var(--border)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--modal-bg);border:1px solid var(--border2);border-radius:13px;width:450px;max-width:95vw;max-height:88vh;overflow-y:auto;padding:22px;animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--white);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;margin-top:-4px}
.modal-close:hover{color:var(--text)}
.fr{margin-bottom:11px}
.fr label{display:block;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:4px}
.fi{width:100%;background:var(--form-bg);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--gold)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-act{display:flex;gap:7px;margin-top:16px}
.log-box{background:var(--log-bg);border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);line-height:1.8;max-height:170px;overflow-y:auto;margin-top:9px}
.log-ok{color:var(--green)}.log-warn{color:var(--amber)}.log-err{color:var(--red)}.log-info{color:var(--blue)}
.load-track{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:7px}
.load-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:ld 1.3s ease-in-out infinite}
@keyframes ld{0%{width:0%;margin-left:0%}50%{width:55%;margin-left:22%}100%{width:0%;margin-left:100%}}
.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── iPhone / iOS fixes ─────────────────────────────────────────────────── */
@supports(padding: max(0px)){
  body { padding-bottom: env(safe-area-inset-bottom); }
  .scan-panel-fixed { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}
/* Prevent tap highlight */
* { -webkit-tap-highlight-color: transparent; }
/* Min touch target 44px */
button, .btn, .nav-btn { min-height: 44px; min-width: 44px; }
.chip { min-height: 28px; }
/* Fix position:fixed on iOS (Safari scroll bug) */
#scan-panel { position: sticky; bottom: 0; position: -webkit-sticky; }
/* Better scroll on iOS */
.cal-wrap { -webkit-overflow-scrolling: touch; }
/* Prevent zoom on input focus */
input, select, textarea { font-size: 16px !important; }
/* Mobile header wrap */
@media (max-width: 600px) {
  .topbar { flex-wrap: wrap; gap: 4px; padding: 8px; }
  .scan-btn-group { flex-wrap: wrap; gap: 4px; }
  .scan-btn-group button { font-size: 12px; padding: 8px 10px; }
  .day { min-height: 60px; }
  .chip { font-size: 9px; }
  .chip-a { font-size: 9px; }
  .stat-pill { font-size: 11px; padding: 4px 8px; }
  .modal { max-width: 95vw !important; }
  .modal-inner { padding: 16px !important; }
}
/* Swipe-friendly larger day cells on mobile */
@media (max-width: 480px) {
  #m-grid { gap: 1px; }
  .day { min-height: 52px; padding: 3px; }
  .dn { font-size: 12px; }
  .dow-h { font-size: 10px; padding: 3px 0; }
}

/* ═══════════════════════════════════════════════════
   DESKTOP  (> 768px)
═══════════════════════════════════════════════════ */
html, body { height: 100%; margin: 0; }
body {
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
  font-family: 'DM Sans', sans-serif;
}

/* ── Desktop topbar: single elegant row ───────────── */
#topbar {
  flex-shrink: 0; height: 54px;
  display: flex; align-items: center; gap: 0;
  background: var(--topbar); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); z-index: 50;
  padding: 0 16px;
}
#tb-desktop {
  display: flex; align-items: center; gap: 8px; width: 100%; height: 100%;
}
#tb-mobile { display: none !important; }
#fab-scan  { display: none !important; }
#scan-sheet { display: none !important; }
#tb-mobile { display: none !important; }
#fab-scan  { display: none !important; }
#scan-sheet { display: none !important; }

/* Brand */
.brand {
  display: flex; align-items: center; gap: 9px;
  margin-right: 16px; flex-shrink: 0;
}
.brand-icon {
  width: 30px; height: 30px; border-radius: 7px;
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display',serif; font-size: 13px; font-weight: 700; color:#000;
}
.brand-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:600; color:var(--white); }
.brand-sub  { font-family:'DM Mono',monospace; font-size:7px; color:var(--text4); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px; }

/* Month nav (center) */
.topbar-center { flex:1; display:flex; align-items:center; justify-content:center; gap:10px; }
.month-nav     { display:flex; align-items:center; gap:8px; }
.nav-btn {
  width:26px; height:26px; border-radius:6px;
  border:1px solid var(--border2); background:transparent;
  color:var(--text3); font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; cursor:pointer;
}

      <span class="sbico">📅</span><div><div class="sbl">+ Предыдущий</div><div class="sbs" id="sbs2">—</div></div>

  <div id="contracts-area" style="display:none;flex-direction:column;flex:1;overflow-y:auto;padding:12px 16px"></div>

      <div id="m-grid" class="cal-grid"></div>

<script>
/* ─── State ─────────────────────────────────────────────────────────────── */
// mondayOf must be defined before S
function mondayOf(d){const n=new Date(d);const day=n.getDay();const diff=n.getDate()-(day===0?6:day-1);n.setDate(diff);n.setHours(0,0,0,0);return n;}

const S = {
  invoices: [],
  view: "month",
  month: new Date(),
  weekStart: mondayOf(new Date()),
  activeDay: null,
  theme: (function(){try{return localStorage.getItem("pcal_theme")||"white";}catch(e){return "dark";}})(),
  company: "",
};

const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const MONTHS_G = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const DOW = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const DOW_G = ["пн","вт","ср","чт","пт","сб","вс"];
const CAT = {
  utilities:{c:"#4ade80",b:"rgba(74,222,128,.12)"},software:{c:"#38bdf8",b:"rgba(56,189,248,.12)"},
  services:{c:"#fb923c",b:"rgba(251,146,60,.12)"},rent:{c:"#f472b6",b:"rgba(244,114,182,.12)"},
  taxes:{c:"#c084fc",b:"rgba(192,132,252,.12)"},supplies:{c:"#facc15",b:"rgba(250,204,21,.12)"},
  logistics:{c:"#2dd4bf",b:"rgba(45,212,191,.12)"},marketing:{c:"#f87171",b:"rgba(248,113,113,.12)"},
  other:{c:"#94a3b8",b:"rgba(148,163,184,.12)"},
};
const SC={paid:"#4ade80",overdue:"#f87171",urgent:"#fbbf24",upcoming:"#38bdf8",pending:"#64748b"};
const SL={paid:"Оплачен",overdue:"Просрочен",urgent:"Срочно",upcoming:"Ожидает",pending:"Нет даты"};

/* ─── Helpers ───────────────────────────────────────────────────────────── */
const pad = n=>String(n).padStart(2,"0");
const toISO = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtAmt = (a,c="EUR")=>{const n=parseFloat(a);if(isNaN(n))return"—";return new Intl.NumberFormat("ru-RU",{style:"currency",currency:c,minimumFractionDigits:0}).format(n)};
const daysU = s=>{if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)};
const stOf = i=>{if(i.status==="paid")return"paid";if(!i.due_date)return"pending";const d=daysU(i.due_date);if(d<0)return"overdue";if(d<=3)return"urgent";return"upcoming"};
const esc = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

async function apiGet(url){
  try {
    const r = await fetch(url, {credentials:'include'});
    if(r.redirected && r.url.includes('login-page')){window.location='/login-page';return {};}
    if(r.status===401||r.status===403){window.location='/login-page';return {};}
    if(!r.ok) return {};
    return await r.json();
  } catch(e){ console.error('apiGet',url,e); return {}; }
}
async function apiPost(url,data){
  try {
    const r = await fetch(url,{method:"POST",credentials:'include',
      headers:{"Content-Type":"application/json"},body:JSON.stringify(data||{})});
    if(r.redirected && r.url.includes('login-page')){
      window.location='/login-page'; return {};
    }
    if(!r.ok) return {};
    return await r.json();
  } catch(e){ console.error('apiPost',url,e); return {}; }
}
async function apiDelete(url){
  try { await fetch(url,{method:"DELETE",credentials:'include'}); }
  catch(e){}
}

async function loadAll(){
  // Check auth first
  const inv = await apiGet("/api/invoices");
  if(!inv || (typeof inv === 'object' && Object.keys(inv).length === 0 && !Array.isArray(inv))) {
    // Empty object means auth failed - redirect handled in apiGet
    return;
  }
  S.invoices = Array.isArray(inv) ? inv : [];
  const cfg = await apiGet("/api/config");
  S.company = (cfg && cfg.company) || "";
  // Load theme from server Volume (overrides localStorage — survives cache clear)
  if(cfg && cfg.ui_theme){try{setTheme(cfg.ui_theme);}catch(e){}}
  const nameEl = document.getElementById("company-name");
  if(nameEl) nameEl.textContent = S.company;
  // Update overdue tab badge
  var todayISO2 = toISO(new Date());
  var ovCount = S.invoices.filter(function(i){
    return i.status!=='paid' && i.due_date && i.due_date < todayISO2;
  }).length;
  var vtO = document.getElementById('vt-o');
  if(vtO) vtO.textContent = '⚠ Долги' + (ovCount>0?' ('+ovCount+')':'');
  render();
}
async function saveInvoices(){await apiPost("/api/invoices",S.invoices)}
async function setPriority(id, val){
  S.invoices = S.invoices.map(i=>i.id===id?{...i,priority:val}:i);
  await apiPost('/api/invoices', S.invoices);
  render();
}
async function cyclePriority(id){
  const CYCLE = {none:'high', high:'medium', medium:'low', low:'none'};
  const inv = S.invoices.find(i=>i.id===id);
  if(!inv) return;
  const next = CYCLE[inv.priority||'none'];
  S.invoices = S.invoices.map(i=>i.id===id?{...i,priority:next}:i);
  await apiPost('/api/invoices', S.invoices);
  render();
}

async function showPublicUrl(){
  var r = await fetch('/api/public-url');
  var d = await r.json();
  if(d.active && d.url){
    window.open('/public-info?url='+encodeURIComponent(d.url), '_blank');
  } else {
    if(confirm('Публичный доступ не запущен.\nЗапустить run_public.bat для доступа с телефона?\n\nСейчас открыть инструкцию?')){
      window.open('/public-info', '_blank');
    }
  }
}

async function markUnpaid(id){
  S.invoices=S.invoices.map(i=>i.id===id?{...i,status:"pending",paid_at:null}:i);
  await apiPost("/api/invoices",S.invoices);
  render();
}
async function markPaid(id){
  await apiPost(`/api/invoices/${id}/paid`,{});
  await loadAll();
}
async function deleteInv(id){
  if(!confirm("Удалить счёт?"))return;
  await apiDelete(`/api/invoices/${id}`);
  await loadAll();
}

/* ─── Pending docs modal ────────────────────────────────────────────────── */
function openPendingDocs(){
  var pending=S.invoices.filter(function(i){return i.status!=='paid'&&!isContract(i);});
  pending.sort(function(a,b){return (a.due_date||'').localeCompare(b.due_date||'');});
  if(!pending.length){alert('Нет неоплаченных документов');return;}
  var total=pending.reduce(function(s,i){return s+(parseFloat(i.amount)||0);},0);
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:16px';
  modal.onclick=function(e){if(e.target===modal)modal.remove();};
  function buildRows(){
    return pending.map(function(inv){
      var od=inv.due_date&&inv.due_date<toISO(new Date())&&inv.status!=='paid';
      var pdfBtn=inv.has_pdf?'<button onclick="openPdf(\''+esc(inv.id)+'\')" style="background:none;border:1px solid #38bdf8;color:#38bdf8;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer">PDF</button>':'';
      var gdBtn=inv.gdrive_link?'<a href="'+esc(inv.gdrive_link)+'" target="_blank" style="border:1px solid #60a5fa;color:#60a5fa;border-radius:4px;padding:2px 6px;font-size:11px;text-decoration:none">☁</a>':'';
      return '<tr style="border-bottom:1px solid rgba(255,255,255,.06)" data-row-id="'+esc(inv.id)+'">'
        +'<td style="padding:7px 10px;font-size:12px;white-space:nowrap;color:'+(od?'#f87171':'inherit')+'">'+(inv.due_date||'—')+'</td>'
        +'<td style="padding:7px 10px;font-size:12px;font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(inv.vendor||'')+'">'+esc(inv.vendor||'—')+'</td>'
        +'<td style="padding:7px 10px;font-size:11px;color:var(--text3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc((inv.description||'').slice(0,60))+'</td>'
        +'<td style="padding:7px 10px;font-size:13px;font-weight:700;text-align:right;white-space:nowrap;color:'+(od?'#f87171':'#34d399')+'">'+fmtAmt(inv.amount,inv.currency)+'</td>'
        +'<td style="padding:7px 8px;white-space:nowrap">'+pdfBtn+' '+gdBtn+'</td>'
        +'<td style="padding:7px 8px;text-align:center"><button data-id="'+esc(inv.id)+'" class="pd-paid-btn" style="background:none;border:1px solid #34d399;color:#34d399;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer">✓ Оплачен</button></td>'
        +'</tr>';
    }).join('');
  }
  modal.innerHTML='<div style="background:var(--bg);border-radius:12px;max-width:860px;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0">'
      +'<div style="font-size:15px;font-weight:700">💳 К оплате · '+pending.length+' шт. · <span style="color:#f87171">'+fmtAmt(total)+'</span></div>'
      +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 4px">×</button>'
    +'</div>'
    +'<div style="overflow-y:auto;flex:1"><table style="width:100%;border-collapse:collapse">'
      +'<thead><tr style="background:var(--bg2);position:sticky;top:0">'
        +'<th style="padding:7px 10px;font-size:11px;text-align:left;color:var(--text3)">Срок</th>'
        +'<th style="padding:7px 10px;font-size:11px;text-align:left;color:var(--text3)">Вендор</th>'
        +'<th style="padding:7px 10px;font-size:11px;text-align:left;color:var(--text3)">Описание</th>'
        +'<th style="padding:7px 10px;font-size:11px;text-align:right;color:var(--text3)">Сумма</th>'
        +'<th style="padding:7px 10px;font-size:11px;color:var(--text3)">PDF</th>'
        +'<th style="padding:7px 10px;font-size:11px;color:var(--text3)">Статус</th>'
      +'</tr></thead>'
      +'<tbody id="pd-tbody">'+buildRows()+'</tbody>'
    +'</table></div>'
  +'</div>';
  document.body.appendChild(modal);
  modal.addEventListener('click',function(e){
    var btn=e.target.closest('.pd-paid-btn');
    if(!btn)return;
    var id=btn.dataset.id;
    apiPost('/api/invoices/'+id+'/paid',{}).then(function(){
      pending=pending.filter(function(i){return i.id!==id;});
      S.invoices=S.invoices.map(function(i){return i.id===id?Object.assign({},i,{status:'paid'}):i;});
      var row=modal.querySelector('tr[data-row-id="'+id+'"]');
      if(row)row.remove();
      var hdr=modal.querySelector('div[style*="font-size:15px"]');
      if(hdr){var t=pending.reduce(function(s,i){return s+(parseFloat(i.amount)||0);},0);hdr.innerHTML='💳 К оплате · '+pending.length+' шт. · <span style="color:#f87171">'+fmtAmt(t)+'</span>';}
      renderSumBar();
    });
  });
}

/* ─── Theme ─────────────────────────────────────────────────────────────── */
function setTheme(t){
  S.theme=t;
  try{document.documentElement.setAttribute("data-theme",t);}catch(e){}
  try{localStorage.setItem("pcal_theme",t);}catch(e){}
  // Persist to server Volume so theme survives cache clear / new device
  apiPost('/api/save-config',{section:'ui',key:'theme',value:t}).catch(function(){});
  ["dark","grey","white"].forEach(x=>{
    var el=document.getElementById("th-"+x);
    if(el) el.classList.toggle("active",x===t);
  });
}
try{setTheme(S.theme);}catch(e){}

/* ─── Computed ──────────────────────────────────────────────────────────── */
function monthStats(){
  const y=S.month.getFullYear(),m=S.month.getMonth();
  const inv=S.invoices.filter(i=>{if(!i.due_date)return false;const d=new Date(i.due_date);return d.getFullYear()===y&&d.getMonth()===m});
  const pend=inv.filter(i=>i.status!=="paid"),paid=inv.filter(i=>i.status==="paid");
  const over=inv.filter(i=>stOf(i)==="overdue");
  const sp=pend.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const sd=paid.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const st=inv.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  // Estonian invoices = vat_rate 24%
  const ee=inv.filter(i=>i.vat_rate==24||i.vat_rate==="24");
  const eeTotal=ee.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const eeVat  =ee.reduce((s,i)=>s+(parseFloat(i.vat_amount)||0),0);
  const eeNet  =ee.reduce((s,i)=>s+(parseFloat(i.amount_ex_vat)||(parseFloat(i.amount)||0)/1.24),0);
  const sOver=over.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  return{total:inv.length,pending:pend.length,paid:paid.length,overdue:over.length,
         sp,sd,st,pct:st>0?Math.round(sd/st*100):0,sOver,
         eeTotal,eeVat:Math.round(eeVat*100)/100,eeNet:Math.round(eeNet*100)/100,eeCnt:ee.length};
}
function weekStats(){
  const wd=weekDays();
  const ws=toISO(wd[0]),we=toISO(wd[6]);
  const inv=S.invoices.filter(i=>i.due_date&&i.due_date>=ws&&i.due_date<=we);
  const pend=inv.filter(i=>i.status!=="paid"),paid=inv.filter(i=>i.status==="paid");
  const sp=pend.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const sd=paid.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const st=inv.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const rng=`${wd[0].getDate()}.${pad(wd[0].getMonth()+1)} – ${wd[6].getDate()}.${pad(wd[6].getMonth()+1)}`;
  return{total:inv.length,pending:pend.length,paid:paid.length,sp,sd,st,pct:st>0?Math.round(sd/st*100):0,rng};
}

/* ─── Grid builders ─────────────────────────────────────────────────────── */
function monthCells(){
  const y=S.month.getFullYear(),m=S.month.getMonth();
  const fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1,dim=new Date(y,m+1,0).getDate();
  const c=[];
  for(let i=0;i<off;i++)c.push({date:new Date(y,m,-off+i+1),cur:false});
  for(let d=1;d<=dim;d++)c.push({date:new Date(y,m,d),cur:true});
  while(c.length%7)c.push({date:new Date(y,m+1,c.length-dim-off+1),cur:false});
  return c;
}
function weekDays(){
  const d=[];for(let i=0;i<7;i++){const x=new Date(S.weekStart);x.setDate(x.getDate()+i);d.push(x);}return d;
}
function evOnDay(date){
  const ds=toISO(date);
  const today=toISO(new Date());
  // On today: also show all overdue unpaid invoices
  if(ds===today){
    return S.invoices.filter(i=>{
      if(i.due_date===ds) return true;
      if(i.status!=="paid" && i.due_date && i.due_date<ds) return true;
      return false;
    });
  }
  return S.invoices.filter(i=>i.due_date===ds);
}
function pdfIcon(sz){
  sz=sz||16;
  var s='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 28" ';
  s+='xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle">';
  s+='<path d="M4 0h11l7 7v19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2z" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>';
  s+='<path d="M15 0l7 7h-7V0z" fill="#ddd"/>';
  s+='<rect x="2" y="14" width="20" height="9" rx="1" fill="#e53e3e"/>';
  s+='<text x="12" y="21.5" font-family="Arial" font-size="6.5" font-weight="900" fill="#fff" text-anchor="middle">PDF</text>';
  s+='</svg>';
  return s;
}

function dayHTML(date){
  const invs=evOnDay(date);
  const total=invs.filter(i=>i.status!=="paid").reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const vis=invs.slice(0,3),extra=invs.length-vis.length;
  let h="";
  for(const inv of vis){
    const st=stOf(inv),cat=CAT[inv.category]||CAT.other;
    h+=`<div class="chip" style="background:${cat.b};border-left-color:${SC[st]};color:${cat.c}" onclick="event.stopPropagation();selDay('${toISO(dc.date)}')">
      <span class="chip-d"></span><span class="chip-n">${esc(inv.vendor||"Счёт")}</span>
      <span class="chip-a">${fmtAmt(inv.amount,inv.currency)}</span>${inv.has_pdf?(`<span class="chip-pdf" onclick="event.stopPropagation();openPdf('${inv.id}')" title="${esc(inv.pdf_filename||'PDF')}">📄</span>`+(inv.gdrive_link?`<a href="${inv.gdrive_link}" target="_blank" class="chip-drive">☁</a>`:"")):""}${inv.reminder_count>1?"<span class='chip-remind'>🔔"+inv.reminder_count+"</span>":""}${inv.priority==="high"?"<span class='chip-pri'>🔴</span>":inv.priority==="medium"?"<span class='chip-pri'>🟡</span>":""}</div>`;
  }
  if(extra>0)h+=`<div class="more">+${extra}</div>`;
  return{h,total};
}

/* ─── Render ────────────────────────────────────────────────────────────── */


function renderOffers(){
  var el = document.getElementById('offers-area');
  if(!el) return;

  // Pure offer keywords — NOT invoice keywords
  var offerKW   = ['offer','quote','quotation','proposal','offre','angebot',
                   'предложение','прайс','hinnapakkumine','kokkulepe'];
  var invoiceKW = ['arve','invoice','bill','rechnung','счёт','счет','lasku',
                   'faktura','payment due','amount due','tasuda'];

  // Only show if it has OFFER keywords AND no invoice keywords
  var offers = S.invoices.filter(function(inv){
    var d = (inv.description||'').toLowerCase();
    var v = (inv.vendor||'').toLowerCase();
    var hasOffer   = offerKW.some(function(k){ return d.includes(k)||v.includes(k); });
    var hasInvoice = invoiceKW.some(function(k){ return d.includes(k)||v.includes(k); });
    return (hasOffer && !hasInvoice) || inv.is_offer === true;
  });

  // Deduplicate by normalised description (remove Re:/RE: prefix)
  var seen = {};
  offers = offers.filter(function(inv){
    var norm = (inv.description||'').replace(/^(Re:|RE:|Fwd:|FW:\s*)+/gi,'').trim().toLowerCase().slice(0,60);
    if(seen[norm]) return false;
    seen[norm] = true;
    return true;
  });

  var html2 = '<div style="padding:14px">';

  if(offers.length === 0){
    html2 += '<div class="ov-empty" style="text-align:center;padding:40px 0;color:var(--text3)">'
      +'Предложений нет.<br><span style="font-size:12px">Письма с "offer", "quote", "proposal" появятся здесь.</span></div>';
  } else {
    html2 += '<div class="ov-title">💼 Предложения · '+offers.length+'</div>';
    offers.sort(function(a,b){ return (b.issue_date||'')>(a.issue_date||'')?1:-1; });
    offers.forEach(function(inv){
      var amt = parseFloat(inv.amount||0);
      var amtStr = amt>0 ? fmtAmt(amt,inv.currency) : '<span style="color:var(--text3);font-style:italic">цена не указана</span>';
      var remind = inv.reminder_count>1
        ? '<span class="ic-remind">🔔 ×'+inv.reminder_count+'</span>' : '';
      html2 += '<div class="ov-card of-card" style="border-left-color:#8b5cf6;margin-bottom:8px;background:var(--inv-bg);border:1px solid var(--border2);border-radius:8px;padding:10px;border-left:3px solid #8b5cf6">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'

function markOfferAccepted(id){
  var inv = S.invoices.find(function(i){ return i.id === id; });
  if(!inv){ showNotif('Не найден','err'); return; }
  inv.is_offer   = false;
  inv.category   = inv.category || 'services';
  inv.status     = inv.status === 'paid' ? 'paid' : 'pending';
  if(!inv.due_date) inv.due_date = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  // Remove offer keywords from description to avoid re-detection
  saveInvoices(S.invoices);
  showNotif('✅ Перемещено в счета','ok');
  loadInvoices();
  setView('month');
}

var _liveST=null;
function liveSearch(q){
  clearTimeout(_liveST);
  q=q.trim();
  if(!q){hideLiveResults();return;}
  _liveST=setTimeout(function(){doLiveSearch(q);},200);
}
function doLiveSearch(q){
  var tokens=q.toLowerCase().split(/\s+/).filter(Boolean);
  var results=S.invoices.filter(function(inv){
    var text=[inv.vendor,inv.description,inv.invoice_number,String(inv.amount||''),inv.due_date,inv.issue_date].join(' ').toLowerCase();
    return tokens.every(function(t){return text.includes(t);});
  }).slice(0,12);
  showLiveResults(results,q);
}
function showLiveResults(results,q){
  var wrap=document.getElementById('topSearchWrap');
  hideLiveResults();
  var today=new Date();today.setHours(0,0,0,0);
  var SC2={paid:'#4ade80',pending:'#f59e0b',overdue:'#f87171'};
  var p=document.createElement('div');
  p.id='liveResultsPanel';
  p.style.cssText='position:absolute;top:110%;left:0;min-width:300px;max-width:400px;background:var(--bg2);'
    +'border:1px solid var(--border2);border-radius:12px;padding:6px;z-index:9999;'
    +'box-shadow:0 8px 32px rgba(0,0,0,.35);max-height:65vh;overflow-y:auto';
  if(!results.length){
    p.innerHTML='<div style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e</div>';
  } else {
    results.forEach(function(inv){
      var st='pending';
      if(inv.status==='paid')st='paid';
      else if(inv.due_date&&new Date(inv.due_date+'T00:00:00')<today)st='overdue';
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;gap:8px';
      row.onmouseenter=function(){this.style.background='var(--bg)';};
      row.onmouseleave=function(){this.style.background='';};
      row.onclick=function(){
        hideLiveResults();
        document.getElementById('topSearchInput').value='';
        if(inv.has_pdf){openPdf(inv.id);return;}
        var dt=new Date((inv.due_date||inv.issue_date||'')+'T00:00:00');
        if(!isNaN(dt)){S.month=new Date(dt.getFullYear(),dt.getMonth(),1);S.view='month';S.activeDay=dt;render();}
      };
      var left=document.createElement('div');
      left.style.cssText='flex:1;min-width:0';
      left.innerHTML='<div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(inv.vendor||'\u2014')+'</div>'+
        (inv.description?'<div style="font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(inv.description)+'</div>':'')+
        '<div style="font-size:10px;color:var(--text3)">'+(inv.due_date?'\u0434\u043e '+inv.due_date:'')+' '+(inv.invoice_number?'\u2116'+inv.invoice_number:'')+'</div>';
      var right=document.createElement('div');
      right.style.cssText='text-align:right;flex-shrink:0';
      right.innerHTML='<div style="font-size:13px;font-weight:800;color:'+SC2[st]+'">'+fmtAmt(inv.amount,inv.currency)+'</div>'+
        (inv.has_pdf?'<div style="margin-top:2px">'+pdfIcon(11)+'</div>':'');
      row.appendChild(left);row.appendChild(right);
      p.appendChild(row);
    });
  }
  wrap.appendChild(p);
}
function hideLiveResults(){var p=document.getElementById('liveResultsPanel');if(p)p.remove();}
document.addEventListener('click',function(e){var w=document.getElementById('topSearchWrap');if(w&&!w.contains(e.target))hideLiveResults();});

function renderCalendar(){
  const mg=document.getElementById("m-grid"),wg=document.getElementById("w-grid");
  const todayISO=toISO(new Date()),actISO=S.activeDay?toISO(S.activeDay):"";
  if(S.view==="month"){
    wg.style.display="none";mg.style.display="grid";
    // Headers in separate div, days fill remaining space equally
    const cells = monthCells();
    const weeks  = Math.ceil(cells.length / 7);  // 4, 5 or 6
    let heads = DOW.map(d=>`<div class="dow-h">${d}</div>`).join("");
    let days  = "";
    for(const dc of cells){
      const ds=toISO(dc.date),{h:dh,total}=dayHTML(dc.date);
      const invs=evOnDay(dc.date);
      const hasOv=invs.some(i=>stOf(i)==="overdue"),hasUg=invs.some(i=>stOf(i)==="urgent");
      const cls=["day",!dc.cur?"dim":"",ds===todayISO?"today":"",ds===actISO?"act":"",hasOv?"has-ov":hasUg?"has-ug":""].filter(Boolean).join(" ");
      days+=`<div class="${cls}" onclick="selDay('${ds}')">
        <div class="day-n"><span class="dn">${dc.date.getDate()}</span>${total>0?`<span class="d-sum has">${fmtAmt(total)}</span>`:""}</div>
        ${dh}</div>`;
    }
    // Set grid: header row auto, then N equal week rows
    mg.style.gridTemplateRows = `auto repeat(${weeks}, 1fr)`;
    mg.innerHTML = heads + days;
  }else{
    mg.style.display="none";wg.style.display="grid";
    const wd=weekDays();
    let h=wd.map((d,i)=>{
      const isT=toISO(d)===todayISO;
      return`<div class="dow-h">${DOW[i]}<br><span style="font-family:'Playfair Display',serif;font-size:18px;${isT?"color:var(--gold);font-weight:700":""}">${d.getDate()}</span></div>`;
    }).join("");
    for(const d of wd){
      const ds=toISO(d),{h:dh}=dayHTML(d);
      const cls=["day",ds===todayISO?"today":"",ds===actISO?"act":""].filter(Boolean).join(" ");
      h+=`<div class="${cls}" style="min-height:280px" onclick="selDay('${ds}')">${dh}</div>`;
    }
    wg.innerHTML=h;
  }
}

function scanSequential(totalMonths) {
  var btnIds = {1:"scanThisBtn",2:"scan2Btn",4:"scan3Btn"};
  var btnLabels = {1:"📥 Этот месяц",2:"📥 + Предыдущий",4:"📥 + 3 месяца"};
  var btn = document.getElementById(btnIds[totalMonths]);
  if(btn && btn.disabled) return;
  // Build list of months to scan: current first, then going back
  var months = [];
  var now = new Date();
  for(var i = 0; i < totalMonths; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var last = new Date(d.getFullYear(), d.getMonth()+1, 0);
    function fmt(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
    var mname = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"][d.getMonth()]+" "+d.getFullYear();
    months.push({from:fmt(d), to:fmt(last), label:mname});
  }
  if(btn){btn.disabled=true;}
  // Scan each month sequentially
  var idx = 0;
  function scanNext() {
    if(idx >= months.length) {
      if(btn){btn.disabled=false;btn.innerHTML=btnLabels[totalMonths];}
      resetAutoTimer();
      return;
    }
    var mo = months[idx];
    idx++;
    if(btn) btn.innerHTML = '<span class="pulse">⏳</span> ' + mo.label + ' (' + idx + '/' + totalMonths + ')';
    _runScanUrl("/api/scan-month/stream?from="+mo.from+"&to="+mo.to, scanNext);
  }
  scanNext();
}
function scanMonth(months){ scanSequential(months); }

function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="pulse">🔄</span> Проверяю...';
  const es = new EventSource('/api/refresh/stream');
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.done) {
      es.close();
      loadAll();
      btn.disabled = false;
      btn.textContent = '🔄 Обновить';
      if(d.count > 0) showNotif(`📬 +${d.count} новых счетов`, 'ok');
      resetAutoTimer();
    }
  };
  es.onerror = () => { es.close(); btn.disabled=false; btn.textContent='🔄 Обновить'; };
}

// ── Auto-scan timer display ───────────────────────────────────────────────────
let autoScanInterval = null;
let nextScanAt = null;

function startAutoTimer(minutesFromNow) {
  nextScanAt = Date.now() + minutesFromNow * 60000;
  if (autoScanInterval) clearInterval(autoScanInterval);
  autoScanInterval = setInterval(() => {
    const left = nextScanAt - Date.now();
    if (left <= 0) {
      document.getElementById('autoScanTimer').textContent = '🔄 сканирую...';
      clearInterval(autoScanInterval);
      // Trigger quick scan
      fetch('/api/refresh/stream').then(r => {
        const reader = r.body.getReader();
        const read = () => reader.read().then(({done, value}) => {
          if (done) { loadInvoices(); startAutoTimer(60); return; }
          try {
            const text = new TextDecoder().decode(value);
            text.split('\n').forEach(line => {
              if (line.startsWith('data:')) {
                const d = JSON.parse(line.slice(5));
                if (d.done && d.count > 0) {
                  showNotif(`📬 +${d.count} новых счетов`, 'ok');
                }
              }
            });
          } catch(e) {}
          read();
        }).catch(()=>{startAutoTimer(60);});
        read();
      }).catch(()=>{ startAutoTimer(60); });
    } else {
      const m = Math.floor(left / 60000);
      const s = Math.floor((left % 60000) / 1000);
      document.getElementById('autoScanTimer').textContent =
        `следующий скан через ${m}:${String(s).padStart(2,'0')}`;
    }
  }, 1000);
}

function _runScanUrl(url, onDone){
  // Convert SSE URL to background scan start
  var bgUrl = url.replace('/api/scan-month/stream','/api/scan-start')
                 .replace('/api/scan/stream','/api/scan-start')
                 .replace('/api/refresh/stream','/api/scan-start');
  
  // Parse from/to params
  var params = {};
  var qs = url.split('?')[1]||'';
  qs.split('&').forEach(function(p){
    var kv=p.split('='); if(kv[0]) params[kv[0]]=kv[1]||'';
  });
  
  // Start background scan (returns immediately)
  fetch('/api/scan-start',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-PC-Token':window._TOKEN||''},
    credentials:'include',
    body:JSON.stringify({
      from_date: params.from||params.from_date||null,
      to_date:   params.to||params.to_date||null,
      quick:     url.includes('/refresh/')
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.ok && !d.running){
      showNotif('Ошибка запуска: '+d.error,'err');
      if(onDone) onDone();
      return;
    }
    showNotif(d.running?'Скан уже идёт':'✅ Скан запущен в фоне — можешь закрыть страницу','ok');
    _startPolling(onDone);
  })
  .catch(function(e){
    showNotif('Ошибка: '+e.message,'err');
    if(onDone) onDone();
  });
}

var _pollInterval = null;
var _pollDone = null;

function _startPolling(onDone){
  _pollDone = onDone;
  if(_pollInterval) clearInterval(_pollInterval);
  _showScanPanel();
  _pollInterval = setInterval(_pollStatus, 2500);
  _pollStatus(); // immediate first check
}

function _pollStatus(){
  fetch('/api/scan-status',{
    headers:{'X-PC-Token':window._TOKEN||''},
    credentials:'include'
  })
  .then(function(r){return r.json();})
  .then(function(d){
    _updateScanPanel(d);
    if(!d.running && !d.queued && d.started){
      clearInterval(_pollInterval);
      _pollInterval = null;
      if(_pollDone) { _pollDone(); _pollDone = null; }
      loadInvoices();
      resetAutoTimer();
      if(d.found > 0)
        showNotif('✅ Найдено '+d.found+' новых счетов!','ok');
    }
  })
  .catch(function(){});
}

function _showScanPanel(){
  var panel = document.getElementById('scan-status-panel');
  if(!panel){
    panel = document.createElement('div');
    panel.id = 'scan-status-panel';
    panel.style.cssText = 'position:sticky;bottom:0;left:0;right:0;background:#1e293b;'
      +'border-top:2px solid #f59e0b;padding:12px 16px;z-index:80;'
      +'box-shadow:0 -4px 24px rgba(0,0,0,.3);font-size:13px;color:#e2e8f0;'
      +'padding-bottom:calc(12px + env(safe-area-inset-bottom))';
    document.body.appendChild(panel);
  }

}

function _updateScanPanel(d){
  var panel = document.getElementById('scan-status-panel');
  if(!panel) return;
  var pct = d.pct || (d.total>0 ? Math.round(d.done/d.total*100) : 0);
  var lastMsg = '';
  if(d.log && d.log.length > 0) lastMsg = d.log[d.log.length-1].msg;
  var speed = d.speed ? d.speed.toFixed(1)+' п/с' : '';
  var eta   = d.eta   ? '~'+d.eta+'с'             : '';
  
  var statusIcon = d.running ? '📬' : (d.found>0 ? '✅' : '📭');
  var statusText = d.running
    ? 'Анализирую...'
    : (d.finished ? 'Готово' : 'Ожидание');

  panel.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<span style="color:#fbbf24;font-weight:600">'
        +statusIcon+' '+statusText
        +(d.running&&d.found>0?' · найдено '+d.found:'')
      +'</span>'
      +'<div style="display:flex;gap:10px;align-items:center">'
        +(d.total>0?'<span style="color:#9ca3af;font-size:11px">'+d.done+'/'+d.total+'</span>':'')
        +(d.running?'<button onclick="stopScan()" style="padding:3px 10px;border-radius:6px;'
          +'border:1px solid #ef4444;background:transparent;color:#ef4444;'
          +'font-size:11px;cursor:pointer">■ Стоп</button>'
          :'<button onclick="hideScanPanel()" style="padding:3px 10px;border-radius:6px;'
          +'border:1px solid #374151;background:transparent;color:#9ca3af;'
          +'font-size:11px;cursor:pointer">✕</button>')
      +'</div>'
    +'</div>'
    +'<div style="background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;'
        +'background:linear-gradient(90deg,#f59e0b,#f97316);'
        +'transition:width .4s;border-radius:4px"></div>'
    +'</div>'
    +(lastMsg
      ?'<div style="margin-top:5px;display:flex;justify-content:space-between">'
        +'<span style="font-size:11px;color:#6b7280;overflow:hidden;white-space:nowrap;max-width:70%">'
          +lastMsg.slice(0,70)+'</span>'
        +'<span style="font-size:11px;color:#6b7280">'+speed+(eta?' · '+eta:'')+'</span>'
      +'</div>'
      :'');
}

function _setProgress(cur, tot, speed, eta){
  const pct = tot>0 ? Math.round(cur/tot*100) : 0;
  const bar  = document.getElementById("sc-prog-bar");
  const lbl  = document.getElementById("sc-prog-label");
  const pctEl= document.getElementById("sc-prog-pct");
  const cnt  = document.getElementById("sc-prog-count");
  const spd  = document.getElementById("sc-prog-speed");
  const etaEl= document.getElementById("sc-prog-eta");
  if(!bar) return;
  bar.style.width = pct + "%";
  pctEl.textContent = pct + "%";
  cnt.textContent   = `${cur} / ${tot}`;
  spd.textContent   = speed>0 ? `${speed.toFixed(1)} письм/с` : "";
  if(eta>0){
    const m=Math.floor(eta/60), s=eta%60;
    etaEl.textContent = m>0 ? `осталось ~${m}м ${s}с` : `осталось ~${s}с`;
  } else {
    etaEl.textContent = cur>=tot && tot>0 ? "✓ Готово" : "";
  }
  if(cur===0 && tot===0){
    lbl.textContent="Подключение...";
  } else if(cur>=tot && tot>0){
    lbl.textContent="✅ Сканирование завершено";
    bar.style.background="linear-gradient(90deg,#059669,#047857)";
  } else {
    lbl.textContent=`Анализирую письмо ${cur} из ${tot}`;
  }
}

async function doSearch(q){

    var url = '/api/search?q='+encodeURIComponent(q)+'&type='+_searchFilter+'&n=80';
    var r = await fetch(url,{credentials:'include'});
    var data = await r.json();
    renderSearchResults(data.results, q);
    var el = document.getElementById('searchEmpty');
    if(data.results.length===0){
      document.getElementById('searchResults').innerHTML='';
      el.style.display='block';
      document.getElementById('searchStats').textContent='';

      el.style.display='none';
      document.getElementById('searchStats').textContent=
        'Найдено: '+data.total+(data.total===80?' (показаны первые 80)':'');
    }
  } catch(e){
    document.getElementById('searchStats').textContent='Ошибка: '+e.message;
  }
}

function hlText(text, q){
  if(!text||!q) return esc(text||'');
  var tokens = q.toLowerCase().split(/\s+/).filter(Boolean);
  var result = esc(text);
  tokens.forEach(function(t){
    var re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    result = result.replace(re,'<span class="hl">$1</span>');
  });
  return result;
}

    var st = 'pending';
    if(inv.status==='paid') st='paid';
    else if(inv.due_date){
      var dd=new Date(inv.due_date+'T00:00:00');
      if(dd<today) st='overdue';
      else if((dd-today)/86400000<=7) st='urgent';
    }

    var card = document.createElement('div');
    card.className = 'sr-card';
    card.dataset.id = inv.id;
    card.onclick = function(){ openSearchResult(inv.id); };

    var left = '<div>';
    left += '<div class="sr-vendor">'+hlText(inv.vendor||'Без имени',q)+'</div>';
    if(inv.description) left += '<div class="sr-desc">'+hlText(inv.description,q)+'</div>';
    left += '<div class="sr-meta">';
    if(inv.invoice_number) left += '<span>№ '+hlText(inv.invoice_number,q)+'</span>';
    if(inv.issue_date) left += '<span>📅 '+inv.issue_date+'</span>';
    if(inv.due_date)   left += '<span>⏰ до '+inv.due_date+'</span>';
    left += '</div>';
    left += '<div class="sr-badges">';
    if(inv.has_pdf)     left += '<span class="sr-badge" style="background:rgba(96,165,250,.15);color:#60a5fa">📄 PDF</span>';
    if(inv.gdrive_link) left += '<span class="sr-badge" style="background:rgba(52,211,153,.12);color:#34d399">☁️ Drive</span>';
    if(inv.is_offer)    left += '<span class="sr-badge" style="background:rgba(139,92,246,.15);color:#a78bfa">💼 Оффер</span>';
    left += '</div></div>';

    var right = '<div style="text-align:right">';
    if(inv.amount) right += '<div class="sr-amount">'+fmtAmt(inv.amount,inv.currency)+'</div>';
    right += '<div class="sr-status" style="color:'+STATUS_COLORS[st]+'">'+STATUS_LABELS[st]+'</div>';
    right += '</div>';

    card.innerHTML = left + right;

    // PDF button
    if(inv.has_pdf){
      var pdfBtn = document.createElement('button');
      pdfBtn.style.cssText='margin-top:8px;padding:4px 10px;border-radius:7px;border:1px solid #1e2d45;background:#111820;color:#60a5fa;font-size:11px;cursor:pointer';
      pdfBtn.textContent = '📄 PDF';
      pdfBtn.onclick = function(e){ e.stopPropagation(); openPdf(inv.id); };
      card.querySelector('div:last-child').appendChild(pdfBtn);
    }
    if(inv.gdrive_link){
      var driveA = document.createElement('a');
      driveA.href = inv.gdrive_link;
      driveA.target = '_blank';
      driveA.style.cssText='display:block;margin-top:5px;padding:4px 10px;border-radius:7px;border:1px solid rgba(52,211,153,.25);background:rgba(52,211,153,.08);color:#34d399;font-size:11px;text-decoration:none';
      driveA.textContent = '☁️ Drive';
      driveA.onclick = function(e){ e.stopPropagation(); };
      card.querySelector('div:last-child').appendChild(driveA);
    }

    container.appendChild(card);
  });
}

function openSearchResult(id){
  toggleSearch();
  // Navigate to the invoice month
  var inv = S.invoices.find(function(i){ return i.id===id; });
  if(!inv) return;
  var dt = new Date((inv.due_date||inv.issue_date||'')+'T00:00:00');
  if(isNaN(dt)) return;
  S.month = new Date(dt.getFullYear(), dt.getMonth(), 1);
  S.view  = 'month';
  S.activeDay = dt;
  render();
}

</script>
