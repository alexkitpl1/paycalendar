<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PayCalendar — Подключение почты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0f1117;color:#e2e8f0;min-height:100vh;
     display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:18px;
      padding:36px;max-width:460px;width:100%}
a.back{display:inline-flex;align-items:center;gap:5px;color:#4b5563;
       font-size:12px;text-decoration:none;margin-bottom:20px}
a.back:hover{color:#818cf8}
h1{font-size:22px;color:#f7fafc;margin-bottom:6px}
.sub{color:#718096;font-size:13px;margin-bottom:28px;line-height:1.6}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#9ca3af;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:11px 14px;border-radius:9px;
             border:1px solid #374151;background:#111827;color:#e2e8f0;
             font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#2563eb}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:44px}
.pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
         background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px;padding:4px}
.btn-main{width:100%;padding:13px;border-radius:10px;border:none;
          background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;
          font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;
          transition:filter .2s,transform .1s}
.btn-main:hover{filter:brightness(1.1)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.progress{margin-top:14px;display:none}
.prog-bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);
           border-radius:2px;width:0%;transition:width .3s}
.logs{font-family:'Courier New',monospace;font-size:11px;
      background:#0a0e1a;border-radius:8px;padding:10px 12px;
      max-height:150px;overflow-y:auto;line-height:1.7}
.log-ok{color:#34d399}
.log-err{color:#f87171}
.log-info{color:#6b7280}
.log-warn{color:#fbbf24}
.result-ok{background:#064e3b;color:#6ee7b7;border:1px solid #059669;
           border-radius:8px;padding:12px;text-align:center;
           font-size:13px;font-weight:600;margin-top:12px;display:none}
.result-err{background:#450a0a;color:#fca5a5;border:1px solid #dc2626;
            border-radius:8px;padding:12px;font-size:13px;
            margin-top:12px;display:none}
.go-btn{display:flex;align-items:center;justify-content:center;gap:8px;
        width:100%;padding:13px;border-radius:10px;border:none;
        background:linear-gradient(135deg,#059669,#047857);color:#fff;
        font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;
        text-decoration:none;display:none}
.divider{border:none;border-top:1px solid #1e293b;margin:20px 0}
.hint{font-size:11px;color:#4b5563;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">← Назад</a>
  <h1>📧 Подключение почты</h1>
  <p class="sub">Введи данные — PayCalendar запомнит пароль и будет входить автоматически.</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="login@domain.ee" autocomplete="email">
  </div>
  <div class="field">
    <label>Пароль от почты</label>
    <div class="pwd-wrap">
      <input type="password" id="pwd" placeholder="••••••••"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')connect()">
      <button class="pwd-eye" type="button" onclick="togglePwd()">👁</button>
    </div>
  </div>

  <button class="btn-main" id="connectBtn" onclick="connect()">
    🔐 Сохранить и подключить
  </button>

  <div class="progress" id="progressWrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="logs" id="logs"></div>
  </div>

  <div class="result-ok" id="resOk"></div>
  <div class="result-err" id="resErr"></div>
  <a href="/" class="go-btn" id="goBtn">📅 Открыть платёжный календарь →</a>

  <hr class="divider">
  <div class="hint">Пароль шифруется и хранится только на сервере.<br>Ни куки, ни токены не нужны — только email и пароль.</div>
</div>

<script>
function togglePwd(){
  var i=document.getElementById('pwd');
  i.type = i.type==='password' ? 'text' : 'password';
}

function addLog(msg, type){
  var el=document.getElementById('logs');
  var d=document.createElement('div');
  d.className='log-'+(type||'info');
  d.textContent=({'ok':'✓ ','err':'✗ ','warn':'⚠ ','info':'· '}[type]||'· ')+msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

function setProgress(pct){
  document.getElementById('progFill').style.width=pct+'%';
}

async function connect(){
  var email=document.getElementById('email').value.trim();
  var pwd=document.getElementById('pwd').value;
  if(!email||!pwd){alert('Введи email и пароль');return;}

  var btn=document.getElementById('connectBtn');
  btn.disabled=true;
  btn.textContent='Подключаю...';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('resOk').style.display='none';
  document.getElementById('resErr').style.display='none';
  document.getElementById('logs').innerHTML='';
  setProgress(10);

  addLog('Сохраняю учётные данные...');

  // Save email and password via API
  try {
    await fetch('/api/save-config',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({section:'email',key:'address',value:email})});
    await fetch('/api/save-config',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({section:'email',key:'password',value:pwd})});

    addLog('Данные сохранены', 'ok');
    setProgress(30);
    addLog('Проверяю подключение к почте...');

    // Test connection
    var r = await fetch('/api/test-connection',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pwd})});
    var d = await r.json();

    if(d.stream){
      // Use SSE stream for live progress
      setProgress(40);
      var es = new EventSource('/api/playwright-login/stream');
      es.onmessage = function(e){
        var msg = JSON.parse(e.data);
        if(msg.done){
          es.close();
          if(msg.ok||d.ok){
            setProgress(100);
            addLog('Подключено успешно!', 'ok');
            showOk();
          } else {
            showErr('Не удалось войти в почту');
          }
          return;
        }
        addLog(msg.msg, msg.type||'info');
        setProgress(40+Math.min(50,Math.random()*10));
      };
      es.onerror = function(){ es.close(); showOk(); };
    } else if(d.ok){
      setProgress(100);
      addLog(d.message||'Подключено!', 'ok');
      showOk();
    } else {
      addLog(d.error||'Ошибка подключения', 'err');
      // Still save - user can try scanning
      setProgress(80);
      addLog('Данные сохранены. Попробуй запустить сканирование.', 'warn');
      showOk('Данные сохранены (соединение не проверено)');
    }
  } catch(err){
    showErr(err.message);
  }

  btn.disabled=false;
  btn.textContent='🔐 Сохранить и подключить';
}

function showOk(msg){
  var el=document.getElementById('resOk');
  el.textContent='✅ ' + (msg||'Готово! Данные сохранены.');
  el.style.display='block';
  document.getElementById('goBtn').style.display='flex';
  setProgress(100);
}
function showErr(msg){
  var el=document.getElementById('resErr');
  el.textContent='❌ '+msg;
  el.style.display='block';
}

// Prefill from config
fetch('/api/config').then(r=>r.json()).then(d=>{
  if(d.email) document.getElementById('email').value=d.email;
}).catch(()=>{});
</script>
</body>
</html>
