<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PayCalendar — Настройки</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0c0f14;color:#c8d8ec;min-height:100vh;padding:0 0 60px}
a{color:#60a5fa;text-decoration:none}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #131e2d;background:#0f1520;position:sticky;top:0;z-index:10}
.back{color:#6b7280;font-size:13px;padding:6px 12px;border:1px solid #1e2d45;border-radius:8px;background:#111820}
.back:hover{color:#c8d8ec;border-color:#2a3a50}
h1{font-size:17px;font-weight:600;color:#f0f6ff}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.card{background:#0f1520;border:1px solid #131e2d;border-radius:14px;padding:18px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
label{display:block;font-size:11px;color:#5a7a9a;margin-bottom:5px;letter-spacing:.3px}
input[type=text],input[type=email],input[type=password]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #1e2d45;background:#111820;color:#c8d8ec;font-size:13px;outline:none;transition:border .15s}
input:focus{border-color:#38bdf8}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;width:100%;justify-content:center;margin-top:10px}
.btn1:hover{filter:brightness(1.1)}
.btn1:disabled{opacity:.45;cursor:not-allowed}
.btn2{background:#111820;color:#8aa8c8;border:1px solid #1e2d45;width:100%;justify-content:center;margin-top:8px}
.btn2:hover{border-color:#2a3a50;color:#c8d8ec}
.btn-red{background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.log{background:#080c12;border:1px solid #131e2d;border-radius:8px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;margin-top:12px;max-height:200px;overflow-y:auto;min-height:40px;color:#5a7a9a}
.log-ok{color:#4ade80}.log-err{color:#f87171}.log-warn{color:#fbbf24}.log-info{color:#60a5fa}
.hint{font-size:12px;color:#5a7a9a;margin-bottom:12px;line-height:1.6}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.pill-green{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.pill-red{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.pill-blue{background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.2)}
.pill-amber{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px;border:1px solid #1e2d45;background:#111820;color:#5a7a9a;font-size:12px;font-weight:600;cursor:pointer}
.tab.active{background:#1e2d45;color:#38bdf8;border-color:#38bdf8}
.acc-item{display:flex;align-items:center;gap:10px;padding:10px;background:#111820;border-radius:8px;border:1px solid #131e2d;margin-bottom:6px}
.acc-avatar{width:34px;height:34px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.acc-info{flex:1;min-width:0}
.acc-email{font-size:13px;color:#c8d8ec;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-sub{font-size:11px;color:#5a7a9a;margin-top:2px}
.sep{height:1px;background:#131e2d;margin:14px 0}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="back">← Календарь</a>
  <h1>⚙️ Настройки</h1>
</div>

<div class="wrap">

<!-- AI KEYS -->
<div class="card">
  <div class="card-title">🤖 AI ключи</div>
  <div class="hint">Для анализа писем. Без ключей работает по ключевым словам.</div>
  <div id="ai-status"></div>
  <div class="sep"></div>
  <div class="tab-row">
    <button class="tab active" onclick="selProv('gemini',this)">Gemini</button>
    <button class="tab" onclick="selProv('groq',this)">Groq</button>
    <button class="tab" onclick="selProv('openai',this)">OpenAI</button>
    <button class="tab" onclick="selProv('claude',this)">Claude</button>
  </div>
  <label>API ключ</label>
  <input type="text" id="apiKey" placeholder="Вставь ключ..." autocomplete="off">
  <button class="btn btn1" onclick="addKey()">💾 Сохранить ключ</button>
  <div class="log" id="keyLog"></div>
</div>

<!-- EMAIL ACCOUNTS -->
<div class="card">
  <div class="card-title">📧 Email аккаунты</div>
  <div class="hint">Все ящики сканируются вместе при каждом скане.</div>
  <div id="accList"></div>
  <div class="sep"></div>
  <label>Email адрес</label>
  <input type="email" id="newEmail" placeholder="info@company.eu" autocomplete="off">
  <label style="margin-top:8px">Пароль</label>
  <input type="password" id="newPass" placeholder="Пароль от почты" autocomplete="off">
  <label style="margin-top:8px">IMAP сервер</label>
  <input type="text" id="newImap" placeholder="imap.zone.eu" autocomplete="off">
  <button class="btn btn1" id="addAccBtn" onclick="addAccount()">🔌 Проверить и добавить</button>
  <div class="log" id="accLog"></div>
</div>

<!-- IMAP SETTINGS -->
<div class="card">
  <div class="card-title">📡 IMAP соединение</div>
  <div id="imapStatus" class="hint"></div>
  <button class="btn btn2" onclick="fixImap()">🔧 Исправить хост (imap.zone.eu)</button>
  <button class="btn btn2" style="margin-top:8px" onclick="testImap()">📡 Проверить соединение</button>
  <div class="log" id="imapLog"></div>
</div>

<!-- DATA MANAGEMENT -->
<div class="card">
  <div class="card-title">🗄️ Управление данными</div>
  <button class="btn btn2" onclick="doAction('/api/reset-scan','POST',{},'resetLog','Сброс состояния сканирования...')">🔄 Сбросить состояние скана</button>
  <button class="btn btn2" style="margin-top:8px" onclick="doAction('/api/invoices/cleanup','POST',{},'resetLog','Очистка нулевых счетов...')">🧹 Очистить нулевые счета</button>
  <button class="btn btn2" style="margin-top:8px" onclick="doAction('/api/invoices/fix-offers','POST',{},'resetLog','Исправление офферов...')">✂️ Исправить дубликаты офферов</button>
  <div class="log" id="resetLog"></div>
</div>

</div><!-- .wrap -->

<script>
var _prov = 'gemini';

function selProv(p, el){
  _prov = p;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('apiKey').placeholder = {
    gemini:'AIzaSy... (aistudio.google.com)',
    groq:'gsk_... (console.groq.com)',
    openai:'sk-... (platform.openai.com)',
    claude:'sk-ant-... (console.anthropic.com)',
  }[p] || 'API ключ';
}

function log(id, msg, cls){
  var el = document.getElementById(id);
  if(!el) return;
  var ts = new Date().toLocaleTimeString('ru');
  el.innerHTML += '<div class="log-'+(cls||'info')+'">['+ts+'] '+msg+'</div>';
  el.scrollTop = el.scrollHeight;
}

async function api(path, data){
  var opts = {credentials:'include', headers:{'Content-Type':'application/json'}};
  if(data !== undefined){ opts.method = 'POST'; opts.body = JSON.stringify(data); }
  var r = await fetch(path, opts);
  return r.json();
}

async function loadAiStatus(){
  try {
    var d = await api('/api/keys');
    var h = '';
    var providers = [
      {name:'Gemini', key:'gemini', color:'amber'},
      {name:'Groq',   key:'groq',   color:'green'},
      {name:'OpenAI', key:'openai', color:'blue'},
      {name:'Claude', key:'claude', color:'blue'},
    ];
    providers.forEach(function(p){
      var cnt = (d[p.key+'_keys'] || []).length;
      var active = d.active_provider === p.key;
      h += '<span class="pill pill-'+(cnt>0?p.color:'red')+'" style="margin:0 4px 4px 0">'
           +p.name+' '+(cnt>0?cnt+' ключ':'нет')+(active?' ✓':'')+'</span>';
    });
    if(!h) h = '<span class="pill pill-amber">Только ключевые слова</span>';
    document.getElementById('ai-status').innerHTML = h;
  } catch(e){ document.getElementById('ai-status').textContent = 'Ошибка загрузки'; }
}

async function addKey(){
  var key = document.getElementById('apiKey').value.trim();
  if(!key){ log('keyLog','Введи ключ','err'); return; }
  log('keyLog','Сохраняю '+_prov+' ключ...','info');
  try {
    var r = await api('/api/keys/add', {key:key, provider:_prov});
    if(r.ok){
      log('keyLog','✅ Ключ сохранён (provider: '+_prov+')','ok');
      document.getElementById('apiKey').value = '';
      loadAiStatus();
    } else {
      log('keyLog','❌ '+r.error,'err');
    }
  } catch(e){ log('keyLog','❌ '+e.message,'err'); }
}

async function loadAccounts(){
  try {
    var accs = await api('/api/email-accounts');
    var h = '';
    if(!accs || !accs.length){
      h = '<div style="color:#5a7a9a;font-size:13px;text-align:center;padding:10px">Нет аккаунтов</div>';
    } else {
      accs.forEach(function(acc){
        var isPrimary = acc.id === 'primary';
        var delBtn = isPrimary ? '' :
          '<button class="btn btn-red" style="padding:4px 10px;font-size:11px" data-id="'+acc.id+'">✕</button>';
        h += '<div class="acc-item">'
          + '<div class="acc-avatar">📧</div>'
          + '<div class="acc-info">'
            + '<div class="acc-email">'+esc(acc.email)+'</div>'
            + '<div class="acc-sub">'+esc(acc.imap)+' · '+(isPrimary?'<span style="color:#4ade80">основной</span>':'дополнительный')+'</div>'
          + '</div>'
          + delBtn
          + '</div>';
      });
    }
    document.getElementById('accList').innerHTML = h;
    // Attach delete handlers
    document.querySelectorAll('#accList .btn-red').forEach(function(btn){
      btn.onclick = function(){
        var accId = btn.getAttribute('data-id');
        delAccount(accId);
      };
    });
  } catch(e){ document.getElementById('accList').innerHTML = '<div style="color:#f87171">Ошибка: '+e.message+'</div>'; }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function addAccount(){
  var email = document.getElementById('newEmail').value.trim();
  var pass  = document.getElementById('newPass').value.trim();
  var imap  = document.getElementById('newImap').value.trim() || 'imap.zone.eu';
  if(!email || !pass){ log('accLog','Введи email и пароль','err'); return; }

  var btn = document.getElementById('addAccBtn');
  btn.disabled = true;
  log('accLog','Проверяю подключение к '+imap+'...','info');

  try {
    var test = await api('/api/email-accounts/test', {email:email, password:pass, imap:imap});
    if(!test.ok){
      log('accLog','❌ '+test.error,'err');
      btn.disabled = false; return;
    }
    log('accLog','✅ '+test.email+' — '+test.total+' писем','ok');

    var save = await api('/api/email-accounts/add', {email:email, password:pass, imap:imap});
    if(save.ok){
      log('accLog','✅ Аккаунт #'+save.idx+' сохранён','ok');
      document.getElementById('newEmail').value = '';
      document.getElementById('newPass').value  = '';
      loadAccounts();
    } else {
      log('accLog','❌ '+save.error,'err');
    }
  } catch(e){ log('accLog','❌ '+e.message,'err'); }
  btn.disabled = false;
}

async function delAccount(accId){
  var idx = parseInt(accId.replace('account_',''));
  if(!confirm('Удалить аккаунт?')) return;
  try {
    var r = await api('/api/email-accounts/delete', {idx:idx});
    log('accLog', r.ok ? '✅ Удалён' : '❌ '+r.error, r.ok?'ok':'err');
    loadAccounts();
  } catch(e){ log('accLog','❌ '+e.message,'err'); }
}

async function fixImap(){
  log('imapLog','Исправляю IMAP хост...','info');
  try {
    var r = await api('/api/setup-zone', {});
    log('imapLog', r.ok ? '✅ '+r.message : '❌ '+r.error, r.ok?'ok':'err');
    loadImapStatus();
  } catch(e){ log('imapLog','❌ '+e.message,'err'); }
}

async function testImap(){
  log('imapLog','Проверяю соединение...','info');
  try {
    var d = await api('/api/test-scan');
    var im = d.imap || {};
    log('imapLog','IMAP: '+(im.ok ? '✅ '+im.total+' писем на '+im.doh_ip : '❌ '+(im.error||'нет ответа')), im.ok?'ok':'err');
    log('imapLog','AI: '+(d.gemini&&d.gemini.ok ? '✅ Gemini OK' : '⚠ Gemini недоступен — используются ключевые слова'),'warn');
  } catch(e){ log('imapLog','❌ '+e.message,'err'); }
}

async function loadImapStatus(){
  try {
    var d = await api('/api/config');
    document.getElementById('imapStatus').textContent = 'Текущий хост: '+d.imap_host+' · Email: '+d.email;
  } catch(e){}
}

async function doAction(path, method, data, logId, msg){
  log(logId, msg, 'info');
  try {
    var r = await api(path, data);
    var detail = r.message || r.error || JSON.stringify(r).slice(0,80);
    log(logId, (r.ok!==false?'✅ ':'❌ ')+detail, r.ok!==false?'ok':'err');
  } catch(e){ log(logId,'❌ '+e.message,'err'); }
}

// Init
loadAiStatus();
loadAccounts();
loadImapStatus();
</script>
</body>
</html>
