[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "at-spi2-atk", "xorg.libX11", 
           "xorg.libxcb", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext",
           "xorg.libXfixes", "xorg.libXrandr", "libgbm", "libxkbcommon",
           "pango", "cairo", "cups", "dbus", "expat", "glib", "gtk3",
           "alsa-lib", "at-spi2-core"]

[phases.install]
cmds = ["pip install -r requirements.txt", 
        "playwright install chromium --with-deps || playwright install chromium"]
